    <!-- Critical inline styles for instant loading -->
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0a0a0a;
        color: #fafafa;
        overflow-x: hidden;
      }
      
      /* Loading screen */
      .initial-loader {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      
      .initial-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      
      .loader-logo {
        width: 60px;
        height: 60px;
        margin-bottom: 20px;
      }
      
      .loader-logo svg {
        width: 100%;
        height: 100%;
        animation: pulse 2s ease-in-out infinite;
      }
      
      .loader-text {
        color: #D4AF37;
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 20px;
        letter-spacing: 2px;
      }
      
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(212, 175, 55, 0.2);
        border-top: 3px solid #D4AF37;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.7; }
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Hide root until loaded */
      #root {
        opacity: 0;
        transition: opacity 0.3s ease-in;
      }
      
      #root.loaded {
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <!-- Initial Loading Screen -->
    <div class="initial-loader" id="initialLoader">
      <div class="loader-logo">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="45" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
          <circle cx="50" cy="50" r="35" stroke="#D4AF37" stroke-width="1.5" opacity="0.5"/>
          <text x="50" y="58" text-anchor="middle" fill="#D4AF37" font-size="22" font-weight="bold" font-family="serif">MS</text>
        </svg>
      </div>
      <div class="loader-text">MS TWENTINITY</div>
      <div class="loader-spinner"></div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Hide loader when content loads -->
    <script>
      window.addEventListener('load', function() {
        const loader = document.getElementById('initialLoader');
        const root = document.getElementById('root');
        
        setTimeout(function() {
          if (loader) loader.classList.add('hidden');
          if (root) root.classList.add('loaded');
        }, 500);
      });
      
      // Fallback: hide loader after 3 seconds
      setTimeout(function() {
        const loader = document.getElementById('initialLoader');
        const root = document.getElementById('root');
        if (loader) loader.classList.add('hidden');
        if (root) root.classList.add('loaded');
      }, 3000);
    </script>
  </body>
